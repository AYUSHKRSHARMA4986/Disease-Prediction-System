<!DOCTYPE html>
<html>
<head>
    <title>Disease Prediction</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .container {
            width: 55%;
            margin: auto;
            background: white;
            padding: 25px;
            margin-top: 40px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        select {
            width: 80%;
            padding: 10px;
            border-radius: 8px;
        }

        .tag {
            display: inline-block;
            background: #4facfe;
            color: white;
            padding: 6px 12px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
        }

        .tag:hover {
            background: red;
        }

        button {
            padding: 12px 25px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .result {
            text-align: left;
            margin-top: 25px;
        }

        .card {
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            background: #f9f9f9;
        }

        .top {
            border-left: 5px solid #28a745;
            background: #eafaf1;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🧠 Disease Prediction</h1>

    <div class="warning">
        ⚠️ This tool provides general health insights and is not a substitute for professional medical advice.
    </div>

    <select id="symptomDropdown" onchange="addSymptom()">
        <option value="">-- Select Symptom --</option>
    </select>

    <div id="selectedBox"></div>

    <div class="error" id="errorMsg"></div>

    <button onclick="predict()">Predict</button>

    <div class="result" id="result"></div>

</div>

<script>

let selectedSymptoms = [];

// 🔹 Load symptoms
async function loadSymptoms() {
    let res = await fetch("https://disease-prediction-system-api-v582.onrender.com/symptoms");
    let data = await res.json();

    let dropdown = document.getElementById("symptomDropdown");

    data.forEach(symptom => {
        let option = document.createElement("option");
        option.value = symptom;
        option.text = symptom.replaceAll("_", " ");
        dropdown.appendChild(option);
    });
}

// 🔹 Add symptom
function addSymptom() {
    let dropdown = document.getElementById("symptomDropdown");
    let value = dropdown.value;

    if (value && !selectedSymptoms.includes(value)) {
        selectedSymptoms.push(value);
        renderSelected();
    }

    dropdown.value = "";
}

// 🔹 Show selected
function renderSelected() {
    let box = document.getElementById("selectedBox");
    box.innerHTML = "";

    selectedSymptoms.forEach(symptom => {
        let tag = document.createElement("span");
        tag.className = "tag";
        tag.innerText = symptom.replaceAll("_", " ");
        tag.onclick = () => removeSymptom(symptom);

        box.appendChild(tag);
    });
}

// 🔹 Remove symptom
function removeSymptom(symptom) {
    selectedSymptoms = selectedSymptoms.filter(s => s !== symptom);
    renderSelected();
}

// 🔹 Predict
async function predict() {

    let errorDiv = document.getElementById("errorMsg");
    errorDiv.innerText = "";

    if (selectedSymptoms.length < 2) {
        errorDiv.innerText = "⚠️ Please select at least 2 symptoms.";
        return;
    }

    try {
        let response = await fetch("https://disease-prediction-system-api-v582.onrender.com/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ selected_symptoms: selectedSymptoms })
        });

        if (!response.ok) throw new Error("API error");

        let data = await response.json();
        console.log("API Response:", data);

        let resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "<h2>Prediction Results:</h2>";

        // 🔥 Low confidence warning
        if (data.results[0].probability < 30) {
            resultDiv.innerHTML += "<p style='color:red;'>⚠️ Low confidence prediction. Try adding more symptoms.</p>";
        }

        // 🔥 Uncertainty warning
        if (data.results.length > 1 &&
            (data.results[0].probability - data.results[1].probability < 10)) {
            resultDiv.innerHTML += "<p style='color:orange;'>⚠️ Model is uncertain. Multiple diseases have similar probability.</p>";
        }

        // 🔥 Show results
        data.results.forEach((item, index) => {
            resultDiv.innerHTML += `
                <div class="card ${index === 0 ? 'top' : ''}">
                    <h3>${item.disease}</h3>
                    <p><b>Confidence:</b> ${item.probability}%</p>
                    <p>${item.description}</p>
                    <p><b>Precautions:</b> ${item.precautions.join(", ")}</p>
                </div>
            `;
        });

    } catch (error) {
        console.error(error);
        document.getElementById("errorMsg").innerText = "⚠️ Failed to get prediction.";
    }
}

// 🔹 Init
loadSymptoms();

</script>

</body>
</html>
